<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Película</title>
    <link rel="stylesheet" th:href="@{/css/peliculas-form.css}">
</head>

<body>
    <div class="container">
        <div class="header">
            <span>🎬</span>
            <h1 th:if="${pelicula.id == null}">Nueva Película</h1>
            <h1 th:if="${pelicula.id != null}">Editar Película</h1>
        </div>

        <form th:action="@{/peliculas/guardar}" th:object="${pelicula}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="titulo">Título</label>
                <input id="titulo" type="text" th:field="*{titulo}" th:classappend="${#fields.hasErrors('titulo')} ? 'input-error'" placeholder="Ej: Inception" required>
                <small class="field-error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></small>
            </div>

            <div class="form-group">
                <label for="director">Director</label>
                <input id="director" type="text" th:field="*{director}" th:classappend="${#fields.hasErrors('director')} ? 'input-error'" placeholder="Ej: Christopher Nolan" required>
                <small class="field-error" th:if="${#fields.hasErrors('director')}" th:errors="*{director}"></small>
            </div>

            <div class="form-group">
                <label for="anio">Año</label>
                <input id="anio" type="number" min="1888" max="2100" th:field="*{anio}" th:classappend="${#fields.hasErrors('anio')} ? 'input-error'" placeholder="2010" required>
                <small class="field-error" th:if="${#fields.hasErrors('anio')}" th:errors="*{anio}"></small>
            </div>

            <div class="form-group">
                <label for="genero">Género</label>
                <select id="genero" th:field="*{genero}" th:classappend="${#fields.hasErrors('genero')} ? 'input-error'" required>
                    <option value="">-- Seleccione un género --</option>
                    <option th:each="g:${generos}" th:value="${g.id}" th:text="${g.nombre}"></option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('genero')}" th:errors="*{genero}"></small>
            </div>

            <div class="form-group">
                <label for="imagen">URL de Imagen</label>
                <input id="imagen" type="url" th:field="*{imagen}" th:classappend="${#fields.hasErrors('imagen')} ? 'input-error'" placeholder="https://ejemplo.com/imagen.jpg" required>
                <small class="field-error" th:if="${#fields.hasErrors('imagen')}" th:errors="*{imagen}"></small>
            </div>

            <div class="form-group">
                <label for="url">URL de la Película</label>
                <input id="url" type="url" th:field="*{url}" th:classappend="${#fields.hasErrors('url')} ? 'input-error'" placeholder="https://ejemplo.com/pelicula" required>
                <small class="field-error" th:if="${#fields.hasErrors('url')}" th:errors="*{url}"></small>
            </div>

            <div class="form-group">
                <label for="reparto">Reparto (seleccione uno o varios actores)</label>
                <select id="reparto" multiple th:field="*{reparto}" th:classappend="${#fields.hasErrors('reparto')} ? 'input-error'">
                    <option th:each="i:${interpretes}" th:value="${i.id}" th:text="${i.nombre}"></option>
                </select>
                <small class="field-error" th:if="${#fields.hasErrors('reparto')}" th:errors="*{reparto}"></small>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-save">
                    💾 Guardar
                </button>
                <a href="/peliculas" class="btn btn-cancel">
                    ↩️ Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
