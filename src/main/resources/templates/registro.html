<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Sistema de Películas</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
    <div class="registro-container">
        <div class="registro-header">
            <h1>🎬 Películas</h1>
            <p>Crear Nueva Cuenta</p>
        </div>

        <!-- Mensaje de error -->
        <div th:if="${error}" class="alert alert-danger">
            <strong>Error!</strong> <span th:text="${error}"></span>
        </div>

        <!-- Mensaje de éxito -->
        <div th:if="${success}" class="alert alert-success">
            <strong>¡Éxito!</strong> <span th:text="${success}"></span>
        </div>

        <!-- Formulario de registro -->
        <form method="POST" th:action="@{/registro}" th:object="${usuario}" class="registro-form">
            
            <div class="field-group full">
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required placeholder="Tu nombre completo">
                    <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>
            </div>

            <div class="field-group full">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" th:field="*{username}" required placeholder="Nombre de usuario único">
                    <div class="help-text">Mínimo 3 caracteres, sin espacios.</div>
                    <div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                </div>
            </div>

            <div class="field-group full">
                <div class="form-group">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" th:field="*{email}" required placeholder="tu@email.com">
                    <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
            </div>

            <div class="field-group full">
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" th:field="*{password}" required placeholder="Mínimo 6 caracteres">
                    <div class="help-text">Mínimo 6 caracteres para mayor seguridad.</div>
                    <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>
            </div>

            <button type="submit" class="btn btn-block">Crear Cuenta</button>
        </form>

        <div class="registro-footer">
            ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a>
        </div>
    </div>
</body>
</html>
