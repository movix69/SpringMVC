<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Registro - Sistema de Películas</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
<div class="registro-container">
    <div class="registro-header">
        <h1>🎬 Películas</h1>
        <p>Crear Nueva Cuenta</p>
    </div>

    <!-- Mensaje de error -->
    <div class="alert alert-danger" th:if="${error}">
        <strong>Error!</strong> <span th:text="${error}"></span>
    </div>

    <!-- Mensaje de éxito -->
    <div class="alert alert-success" th:if="${success}">
        <strong>¡Éxito!</strong> <span th:text="${success}"></span>
    </div>

    <!-- Formulario de registro -->
    <form class="registro-form" method="POST" th:action="@{/registro}" th:object="${usuario}">

        <div class="field-group full">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input id="nombre" placeholder="Tu nombre completo" required th:field="*{nombre}" type="text">
                <div class="error" th:errors="*{nombre}" th:if="${#fields.hasErrors('nombre')}"></div>
            </div>
        </div>

        <div class="field-group full">
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input id="username" placeholder="Nombre de usuario único" required th:field="*{username}" type="text">
                <div class="help-text">Mínimo 3 caracteres, sin espacios.</div>
                <div class="error" th:errors="*{username}" th:if="${#fields.hasErrors('username')}"></div>
            </div>
        </div>

        <div class="field-group full">
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input id="email" placeholder="tu@email.com" required th:field="*{email}" type="email">
                <div class="error" th:errors="*{email}" th:if="${#fields.hasErrors('email')}"></div>
            </div>
        </div>

        <div class="field-group full">
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input id="password" placeholder="Mínimo 6 caracteres" required th:field="*{password}" type="password">
                <div class="help-text">Mínimo 6 caracteres para mayor seguridad.</div>
                <div class="error" th:errors="*{password}" th:if="${#fields.hasErrors('password')}"></div>
            </div>
        </div>

        <button class="btn btn-block" type="submit">Crear Cuenta</button>
    </form>

    <div class="registro-footer">
        ¿Ya tienes cuenta? <a th:href="@{/login}">Inicia sesión aquí</a>
    </div>
</div>
</body>
</html>
