<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Login - Sistema de Películas</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <h1>🎬 Películas</h1>
        <p>Sistema de Gestión de Películas</p>
    </div>

    <!-- Mensaje de error -->
    <div class="alert alert-danger" th:if="${param.error}">
        <strong>Acceso denegado!</strong> Usuario o contraseña incorrectos.
    </div>

    <!-- Mensaje de logout -->
    <div class="alert alert-info" th:if="${param.logout}">
        <strong>Sesión cerrada!</strong> Has cerrado sesión correctamente.
    </div>

    <!-- Mensaje de éxito (después del registro) -->
    <div class="alert alert-success" th:if="${success}">
        <strong>¡Éxito!</strong> <span th:text="${success}"></span>
    </div>

    <!-- Formulario de login -->
    <form class="login-form" method="POST" th:action="@{/login}">
        <div class="form-group">
            <label for="username">Usuario:</label>
            <input id="username" name="username" placeholder="Ingresa tu usuario" required type="text">
        </div>

        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input id="password" name="password" placeholder="Ingresa tu contraseña" required type="password">
        </div>

        <button class="btn btn-block" type="submit">Iniciar Sesión</button>
    </form>

    <div class="divider">O</div>

    <!-- Información de roles -->
    <div class="role-info">
        <h4>Roles Disponibles:</h4>
        <ul>
            <li><strong>VIEWER:</strong> Solo lectura</li>
            <li><strong>EDITOR:</strong> Lectura y modificación</li>
            <li><strong>ADMIN:</strong> Control total</li>
        </ul>
    </div>

    <div class="login-footer">
        ¿No tienes cuenta? <a th:href="@{/registro}">Regístrate aquí</a>
    </div>
</div>
</body>
</html>
