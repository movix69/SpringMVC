<!DOCTYPE html>
<html xmlns:sec="http://www.thymeleaf.org/extras/spring-security" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Catálogo de Películas</title>
    <link rel="stylesheet" th:href="@{/css/peliculas.css}">
</head>

<body>
<!-- Navbar con información del usuario -->
<div th:replace="~{fragments/navbar :: navbarPeliculas}"></div>

<div class="container">
    <!-- Formulario de búsqueda - CENTRADO con botón Nueva Película -->
    <div class="search-section">
        <form class="search-form" method="get">
            <input name="search" placeholder="Buscar película..." th:value="${search}">

            <!-- Mantener el parámetro sort en el submit -->
            <input name="sort" th:value="${sort}" type="hidden">

            <button type="submit">🔍 Buscar</button>
        </form>

        <div class="search-actions">
            <a class="btn-new" href="/peliculas/nuevo" sec:authorize="hasAnyRole('ADMIN', 'EDITOR')">
                + Nueva Película
            </a>
            <button class="btn-new" disabled="true" sec:authorize="hasRole('VIEWER')">
                Solo lectura
            </button>
        </div>
    </div>

    <!-- Grid de películas -->
    <div class="grid-container" th:if="${peliculas.content.size() > 0}">
        <div class="grid">
            <div class="card" th:each="p:${peliculas.content}">
                <a rel="noopener noreferrer" target="_blank" th:href="${p.url}" title="Ir a la película">
                    <img th:alt="${p.titulo}" th:src="${p.imagen}">
                </a>

                <div class="card-content">
                    <h3 th:text="${p.titulo}" th:title="${p.titulo}"></h3>
                    <p><strong>Director:</strong> <span th:text="${p.director}"></span></p>
                    <p><strong>Género:</strong> <span th:text="${p.genero.nombre}"></span></p>
                    <p><strong>Año:</strong> <span th:text="${p.anio}"></span></p>
                    <div class="card-reparto">
                        <strong>Reparto:</strong>
                        <span th:each="i:${p.reparto}" th:text="${i.nombre} + ', '"></span>
                    </div>

                    <div class="card-actions">
                        <a class="action edit" sec:authorize="hasAnyRole('ADMIN', 'EDITOR')"
                           th:href="@{'/peliculas/editar/'+${p.id}}"
                           title="Editar película">
                            ✎ Editar
                        </a>
                        <a class="action delete" onclick="return confirm('¿Estás seguro de que deseas eliminar esta película?')"
                           sec:authorize="hasAnyRole('ADMIN', 'EDITOR')"
                           th:href="@{'/peliculas/borrar/'+${p.id}}"
                           title="Eliminar película">
                            🗑️ Eliminar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Mensaje cuando no hay películas -->
    <div class="empty-message" th:if="${peliculas.content.size() == 0}">
        <p>📭 No se encontraron películas.</p>
    </div>

    <!-- Paginación - CENTRADA ABAJO -->
    <div class="pagination-wrap">
        <div class="pagination">
            <!-- Botón anterior -->
            <a th:href="@{/peliculas(page=${peliculas.number-1},search=${search},sort=${sort},size=${size})}"
               th:if="${peliculas.hasPrevious()}">
                ← Anterior
            </a>

            <!-- Contador tipo Netflix -->
            <span class="page-info" th:if="${peliculas.totalElements > 0}"
                  th:text="'Página ' + (${peliculas.number + 1}) + ' de ' +
                   (${peliculas.totalPages > 0 ? peliculas.totalPages : 1}) +
                   ' | ' + ${peliculas.totalElements} + ' películas'">
                </span>

            <!-- Botón siguiente -->
            <a th:href="@{/peliculas(page=${peliculas.number+1},search=${search},sort=${sort},size=${size})}"
               th:if="${peliculas.hasNext()}">
                Siguiente →
            </a>
        </div>

        <form class="page-size-form" method="get">
            <input name="search" th:value="${search}" type="hidden">
            <input name="page" type="hidden" value="0">

            <label for="size">Películas por página:</label>
            <select id="size" name="size" onchange="this.form.submit()">
                <option th:selected="${size == 5}" value="5">5</option>
                <option th:selected="${size == 10}" value="10">10</option>
                <option th:selected="${size == 15}" value="15">15</option>
                <option th:selected="${size == 20}" value="20">20</option>
            </select>

            <label for="sort">Ordenar por:</label>
            <select id="sort" name="sort" onchange="this.form.submit()">
                <option th:selected="${sort == 'titulo'}" value="titulo">Por Título</option>
                <option th:selected="${sort == 'anio'}" value="anio">Por Año</option>
                <option th:selected="${sort == 'genero'}" value="genero">Por Género</option>
            </select>
        </form>
    </div>
</div>
</body>
</html>
