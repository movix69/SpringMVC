<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Catalogo de Peliculas</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<h1>Catalogo de Peliculas</h1>

<form method="get">
    <input name="search" th:value="${search}" placeholder="Buscar titulo, genero, interprete o ano">

    <select name="sort">
        <option value="titulo" th:selected="${sort == 'titulo'}">Titulo</option>
        <option value="anio" th:selected="${sort == 'anio'}">Ano</option>
        <option value="interprete" th:selected="${sort == 'interprete'}">Interprete</option>
    </select>

    <button type="submit" title="Buscar" aria-label="Buscar">&#128269;</button>
    <a href="/peliculas/nuevo" class="btn" title="Nueva pelicula" aria-label="Nueva pelicula">&#10133;</a>
</form>


<div class="grid">
    <div class="card" th:each="p:${peliculas.content}">
        <a th:href="${p.url}" target="_blank" rel="noopener noreferrer" title="Ir a la pagina de la pelicula" aria-label="Ir a la pagina de la pelicula">
            <img th:src="${p.imagen}" alt="Poster pelicula">
        </a>

        <h3 th:text="${p.titulo}"></h3>
        <p th:text="${p.genero.nombre}"></p>
        <p th:text="${p.anio}"></p>

        <p>
            <span th:each="i:${p.reparto}" th:text="${i.nombre} + ' '"></span>
        </p>

        <div class="card-actions">
            <a class="action" th:href="@{'/peliculas/editar/'+${p.id}}" title="Editar" aria-label="Editar">&#9998;</a>
            <a class="action danger" th:href="@{'/peliculas/borrar/'+${p.id}}" title="Borrar" aria-label="Borrar">&#128465;</a>
        </div>
    </div>
</div>

<div class="pagination-wrap">
    <div class="pagination">
        <a th:if="${peliculas.hasPrevious()}"
           th:href="@{/peliculas(page=${peliculas.number-1},search=${search},sort=${sort},size=${size})}">Anterior</a>

        <span th:text="${peliculas.number+1} + ' / ' + ${peliculas.totalPages > 0 ? peliculas.totalPages : 1}"></span>

        <a th:if="${peliculas.hasNext()}"
           th:href="@{/peliculas(page=${peliculas.number+1},search=${search},sort=${sort},size=${size})}">Siguiente</a>
    </div>

    <form class="page-size-form" method="get">
        <input type="hidden" name="search" th:value="${search}">
        <input type="hidden" name="sort" th:value="${sort}">
        <input type="hidden" name="page" value="0">

        <label for="size">Items por pagina</label>
        <select id="size" name="size" onchange="this.form.submit()">
            <option value="4" th:selected="${size == 4}">4</option>
            <option value="8" th:selected="${size == 8}">8</option>
            <option value="12" th:selected="${size == 12}">12</option>
            <option value="20" th:selected="${size == 20}">20</option>
        </select>
    </form>
</div>

</body>
</html>
